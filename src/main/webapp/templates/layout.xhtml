<!DOCTYPE html>
<html lang="de"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Smart Facility Management</title>
    <h:outputStylesheet library="css" name="style.css"/>
</h:head>

<h:body>

    <header class="site-header">
        <div class="header-brand">
            <h:link outcome="/index.xhtml" styleClass="brand-link">
                Smart Facility Management
            </h:link>
        </div>
        <nav class="site-nav">
            <h:panelGroup rendered="#{authController.loggedIn}">
                <h:link value="Tickets" outcome="/tickets.xhtml" styleClass="nav-link"/>
                <h:panelGroup rendered="#{authController.admin}">
                    <span class="nav-separator">|</span>
                    <h:link value="Nutzer" outcome="/users.xhtml" styleClass="nav-link"/>
                </h:panelGroup>
                <span class="nav-separator">|</span>
                <span class="nav-user">#{authController.currentUser.fullName}</span>
                <h:form id="logoutForm" styleClass="nav-form">
                    <h:commandButton value="Logout"
                                     action="#{authController.logout}"
                                     styleClass="btn btn-secondary"/>
                </h:form>
            </h:panelGroup>
            <h:panelGroup rendered="#{not authController.loggedIn}">
                <h:link value="Login"       outcome="/login.xhtml"    styleClass="nav-link"/>
                <span class="nav-separator">|</span>
                <h:link value="Registrieren" outcome="/register.xhtml" styleClass="nav-link"/>
            </h:panelGroup>
        </nav>
    </header>

    <div class="messages-container">
        <h:messages id="globalMessages" redisplay="false"
                    styleClass="messages"
                    infoClass="msg-info"
                    warnClass="msg-warn"
                    errorClass="msg-error"
                    fatalClass="msg-error"/>
    </div>

    <main class="site-main">
        <ui:insert name="content"/>
    </main>

    <footer class="site-footer">
        <p>DSBPIIJEE01 – Programmierung industrieller Informationssysteme mit Java EE – SoSe 2026</p>
    </footer>

</h:body>
</html>
