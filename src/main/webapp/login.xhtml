<!DOCTYPE html>
<html lang="de"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html">

<ui:composition template="/templates/layout.xhtml">

    <ui:define name="content">
        <div class="form-page">
            <h2>Anmelden</h2>

            <h:form id="loginForm">

                <div class="form-group">
                    <h:outputLabel for="username" value="Benutzername"/>
                    <h:inputText id="username"
                                 value="#{loginController.username}"
                                 required="true"
                                 requiredMessage="Bitte Benutzernamen eingeben."
                                 styleClass="form-control"/>
                    <h:message for="username" styleClass="field-error"/>
                </div>

                <div class="form-group">
                    <h:outputLabel for="password" value="Passwort"/>
                    <h:inputSecret id="password"
                                   value="#{loginController.password}"
                                   required="true"
                                   requiredMessage="Bitte Passwort eingeben."
                                   styleClass="form-control"/>
                    <h:message for="password" styleClass="field-error"/>
                </div>

                <div class="form-actions">
                    <h:commandButton value="Anmelden"
                                     action="#{loginController.submitLogin}"
                                     styleClass="btn btn-primary"/>
                </div>

                <p class="form-hint">
                    Noch kein Konto?
                    <h:link value="Jetzt registrieren" outcome="/register.xhtml"/>
                </p>

            </h:form>
        </div>
    </ui:define>

</ui:composition>
</html>
